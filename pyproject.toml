    "black>=26.3.1",
    "fakeredis>=2.34.1",
    "isort>=8.0.1",
    "moto[events,s3,sqs,stepfunctions]>=5.1.22",
    "mypy>=1.20.0",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.9",
]
